<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <link rel="manifest" href="/manifest.json" />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
        margin: 0;
        background: #071218;
      }
      /* The root element for your Expo app — must paint above the boot overlay */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        position: relative;
        z-index: 1;
      }
      /* Visible until React paints — sits under #root once the app mounts */
      #ledgerline-boot {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        background: #071218;
        color: #eff7f4;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        padding: 24px;
        text-align: center;
      }
      #ledgerline-boot .logo-mark {
        width: 64px;
        height: 64px;
        border-radius: 20px;
        background: linear-gradient(135deg, #14232a 0%, #0e2028 100%);
        border: 1.5px solid #27444f;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 900;
        color: #d4e37d;
        letter-spacing: -1px;
        margin-bottom: 4px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      }
      #ledgerline-boot h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 900;
        color: #eff7f4;
        letter-spacing: -0.5px;
      }
      #ledgerline-boot p {
        margin: 0;
        font-size: 13px;
        color: #7a9da6;
        max-width: 22rem;
        line-height: 1.45;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 600;
      }
      #ledgerline-boot .spinner-wrap {
        margin-top: 8px;
      }
      #ledgerline-boot .spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid #1e3a44;
        border-top-color: #d4e37d;
        border-radius: 50%;
        animation: ledgerline-spin 0.8s linear infinite;
      }
      @keyframes ledgerline-spin {
        to { transform: rotate(360deg); }
      }
      #ledgerline-boot.error .spinner-wrap { display: none; }
      #ledgerline-boot.error .logo-mark { background: #2a1a14; border-color: #8b4a3a; color: #d97e68; }
      #ledgerline-boot.error h1 { color: #d97e68; font-size: 18px; }
      #ledgerline-boot.error pre {
        text-align: left;
        font-size: 12px;
        color: #94bdc4;
        white-space: pre-wrap;
        word-break: break-word;
        max-width: 100%;
      }
    </style>
  </head>

  <body>
    <!-- This app requires JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="ledgerline-boot" aria-live="polite">
      <div class="logo-mark" aria-hidden="true">L</div>
      <h1>Ledgerline</h1>
      <p>Personal Finance</p>
      <div class="spinner-wrap">
        <div class="spinner" aria-hidden="true"></div>
      </div>
    </div>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
    <script>
      (function () {
        function showError(title, detail) {
          var el = document.getElementById('ledgerline-boot');
          if (!el) return;
          el.className = 'error';
          el.innerHTML =
            '<h1>' +
            (title || 'Something went wrong') +
            '</h1><p>If this persists, try another browser or disable strict tracking protection for this site.</p><pre>' +
            (detail || '') +
            '</pre>';
          el.style.zIndex = '9999';
        }
        window.addEventListener('error', function (ev) {
          var msg = ev.message || 'Error';
          if (ev.filename) msg += '\\n' + ev.filename + ':' + (ev.lineno || 0);
          showError('JavaScript error', msg);
        });
        window.addEventListener('unhandledrejection', function (ev) {
          var r = ev.reason;
          var detail = r && r.stack ? String(r.stack) : String(r);
          showError('Unhandled promise rejection', detail);
        });
        window.__ledgerlineRemoveBoot = function () {
          var b = document.getElementById('ledgerline-boot');
          if (b && b.parentNode) b.parentNode.removeChild(b);
        };
        setTimeout(function () {
          var root = document.getElementById('root');
          if (
            document.getElementById('ledgerline-boot') &&
            root &&
            root.childElementCount === 0
          ) {
            showError(
              'App is taking too long',
              'The script may be blocked or failed. Check the browser console, or try disabling shields / ad blockers for this domain.'
            );
          }
        }, 12000);
      })();
    </script>
  </body>
</html>
