<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Uncial+Antiqua&display=swap" />
    <link rel="manifest" href="/manifest.json" />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
        margin: 0;
        background-color: #050008;
        /* Layered violet radial bloom + stained-glass halation at the
           horizons + faint star-grain noise. The deepest black lives at
           the bottom so cards read like they're lit by candles above
           and scraping the crypt floor below. */
        background-image: radial-gradient(
            ellipse 80% 60% at 50% 0%,
            rgba(120, 0, 200, 0.28) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 60% 50% at 15% 85%,
            rgba(90, 0, 163, 0.18) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 55% 45% at 85% 90%,
            rgba(168, 85, 247, 0.10) 0%,
            transparent 65%
          ),
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.10 0 0 0 0 0.05 0 0 0 0 0.18 0 0 0 0.35 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/></svg>");
        background-attachment: fixed;
      }
      /* The root element for your Expo app — must paint above the boot overlay */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        position: relative;
        z-index: 1;
      }
      /* Visible until React paints — sits under #root once the app mounts */
      #ledgerline-boot {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        background:
          radial-gradient(ellipse at 50% 0%, rgba(120,0,200,0.28) 0%, transparent 55%),
          #050008;
        color: #e5d9ff;
        font-family: 'Cinzel', Georgia, serif;
        padding: 24px;
        text-align: center;
      }
      #ledgerline-boot strong {
        text-shadow:
          0 0 10px rgba(232,190,255,0.70),
          0 0 22px rgba(168,85,247,0.55),
          0 0 40px rgba(122,0,255,0.35);
      }
      #ledgerline-boot p {
        margin: 0;
        font-size: 15px;
        color: #a78fd4;
        max-width: 22rem;
        line-height: 1.45;
      }
      #ledgerline-boot .spinner-wrap {
        margin-top: 8px;
      }
      #ledgerline-boot .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(185,131,255,0.22);
        border-top-color: #c084fc;
        border-radius: 50%;
        animation: ledgerline-spin 0.85s linear infinite;
        box-shadow: 0 0 18px rgba(168,85,247,0.45);
      }
      @keyframes ledgerline-spin {
        to {
          transform: rotate(360deg);
        }
      }
      #ledgerline-boot.error .spinner {
        display: none;
      }
      #ledgerline-boot.error h1 {
        color: #c084fc;
        font-size: 18px;
      }
      #ledgerline-boot.error .spinner-wrap { display: none; }
      #ledgerline-boot.error pre {
        text-align: left;
        font-size: 12px;
        color: #a78fd4;
        white-space: pre-wrap;
        word-break: break-word;
        max-width: 100%;
      }
    </style>
  </head>

  <body>
    <!-- This app requires JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="ledgerline-boot" aria-live="polite">
      <div class="spinner-wrap">
        <div class="spinner" aria-hidden="true"></div>
      </div>
      <strong style="font-size: 22px; letter-spacing: 0.18em; text-transform: uppercase;">Ledgerline</strong>
      <small style="font-size: 11px; letter-spacing: 0.32em; color: #6b5746; text-transform: uppercase;">A private ledger</small>
      <p>Unsealing the ledger…</p>
    </div>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
    <script>
      (function () {
        function showError(title, detail) {
          var el = document.getElementById('ledgerline-boot');
          if (!el) return;
          el.className = 'error';
          el.innerHTML =
            '<h1>' +
            (title || 'Something went wrong') +
            '</h1><p>If this persists, try another browser or disable strict tracking protection for this site.</p><pre>' +
            (detail || '') +
            '</pre>';
          el.style.zIndex = '9999';
        }
        window.addEventListener('error', function (ev) {
          var msg = ev.message || 'Error';
          if (ev.filename) msg += '\\n' + ev.filename + ':' + (ev.lineno || 0);
          showError('JavaScript error', msg);
        });
        window.addEventListener('unhandledrejection', function (ev) {
          var r = ev.reason;
          var detail = r && r.stack ? String(r.stack) : String(r);
          showError('Unhandled promise rejection', detail);
        });
        window.__ledgerlineRemoveBoot = function () {
          var b = document.getElementById('ledgerline-boot');
          if (b && b.parentNode) b.parentNode.removeChild(b);
        };
        setTimeout(function () {
          var root = document.getElementById('root');
          if (
            document.getElementById('ledgerline-boot') &&
            root &&
            root.childElementCount === 0
          ) {
            showError(
              'App is taking too long',
              'The script may be blocked or failed. Check the browser console, or try disabling shields / ad blockers for this domain.'
            );
          }
        }, 12000);
      })();
    </script>
  </body>
</html>
